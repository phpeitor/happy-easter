<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='75'>🥚</text></svg>" />
  <title>Happy Easter! </title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Great+Vibes&display=swap">
</head>

<body>
  <div class="logo">
      <div class="box">
        <img src="./img/logo-easter.jpeg">
      </div>
  </div>

  <div class="theman">
    <div class="hairleft"></div>
    <div class="hairright"></div>
    <div class="thornscrown"></div>

    <div class="head">
      <div class="hairline"> </div>
      <div class="bangsright"></div>
      <div class="bangsleft"></div>
      <div class="eyes"></div>
      <div class="mouth"> </div>
      <div class="cheeks"></div>
      <div class="beard"> </div>
    </div>

    <div class="torso">
      <div class="egg"></div>
      <div class="hand"></div>
      <span class="egg-text" id="paragraph2"></span>
    </div>

    <div class="halo"></div>
  </div>

  <div class="middle-text" id="paragraph"></div> 

  <div class="jesus-chat">
    <div class="jesus-chat__header">✝ Las 7 Palabras de Jesús en la Cruz ✝</div>
    <div class="jesus-chat__body" id="jesusChat"></div>
  </div>

  <div class="fx-widget" aria-label="Efectos visuales">
    <button class="fx-widget__btn" id="toggleRain" type="button" aria-pressed="false">Lluvia</button>
    <button class="fx-widget__btn" id="toggleLightning" type="button" aria-pressed="false">Relámpagos</button>
    <button class="fx-widget__btn" id="toggleDark" type="button" aria-pressed="false">Modo oscuro</button>
  </div>

  <div class="dark-overlay" id="darkOverlay" aria-hidden="true"></div>
  <div class="rain-layer" id="rainLayer" aria-hidden="true"></div>
  <div class="lightning-layer" id="lightningLayer" aria-hidden="true"></div>

  <script src='./js/jquery.min.js'></script>
  <script src="./js/typed.min.js"></script>
  <script src="./js/script.js"></script>
</body>
</html>
